# =============================================================================
# RecipeHub — Docker Compose
# Service orchestration for the backend and database.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MongoDB 7 — Document database
  # No host ports; only accessible from the internal network.
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    networks:
      - recipehub_net

  # ---------------------------------------------------------------------------
  # API — Backend Node.js / Express
  # Built from ./backend, exposes port 4000 to the host.
  # ---------------------------------------------------------------------------
  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    volumes:
      - ./backend/src:/app/src
    environment:
      PORT: ${PORT}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    command: npx nodemon src/server.js
    networks:
      - recipehub_net

# ---------------------------------------------------------------------------
# Internal network for service-to-service communication
# ---------------------------------------------------------------------------
networks:
  recipehub_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
