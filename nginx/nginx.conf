# ============================
# RecipeHub — Nginx Config
# ============================
# SSL blocks go here after Certbot:
# server for app.tudominio.xyz (port 443 SSL)
# server for api.tudominio.xyz (port 443 SSL)
# HTTP-to-HTTPS redirect server

# Frontend — serves built React app
server {
    listen 80;
    server_name app.tudominio.xyz;

    # TODO: add SSL block (listen 443 ssl; ssl_certificate; ssl_certificate_key)

    root /var/www/recipehub/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend — proxies API requests
server {
    listen 80;
    server_name api.tudominio.xyz;

    # TODO: add SSL block (listen 443 ssl; ssl_certificate; ssl_certificate_key)

    location / {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
